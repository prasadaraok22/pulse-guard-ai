<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
    <marker id="arrowp" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a371f7"/>
    </marker>
    <style>
      .bg    { fill:#0d1117; }
      .card  { fill:#161b22; stroke:#30363d; stroke-width:1.5; rx:12; }
      .accent{ fill:#1f2a3a; stroke:#58a6ff; stroke-width:1.5; rx:12; }
      .ai    { fill:#20182b; stroke:#a371f7; stroke-width:1.5; rx:12; }
      .alert { fill:#2a1a1f; stroke:#f85149; stroke-width:1.5; rx:12; }
      .ok    { fill:#16241b; stroke:#3fb950; stroke-width:1.5; rx:12; }
      .title { fill:#c9d1d9; font-size:15px; font-weight:700; }
      .sub   { fill:#8b949e; font-size:11.5px; }
      .h     { fill:#c9d1d9; font-size:20px; font-weight:800; }
      .tag   { fill:#8b949e; font-size:12px; }
      .tagp  { fill:#a371f7; font-size:11px; font-weight:700; }
      .flow  { stroke:#58a6ff; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .flowd { stroke:#58a6ff; stroke-width:2; fill:none; stroke-dasharray:5 4; marker-end:url(#arrow); }
      .flowp { stroke:#a371f7; stroke-width:2; fill:none; stroke-dasharray:5 4; marker-end:url(#arrowp); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="960" height="620"/>
  <text class="h" x="32" y="44">🛡️ Pulse Guard AI — Architecture</text>
  <text class="tag" x="32" y="66">Intelligent Observability &amp; Event Watchdog · API-first · deterministic detection + optional GenAI</text>

  <!-- FastAPI boundary -->
  <rect x="24" y="88" width="912" height="430" rx="14" fill="none" stroke="#30363d" stroke-dasharray="4 5"/>
  <text class="tag" x="40" y="110">FastAPI application (Uvicorn)</text>

  <!-- Sources -->
  <rect class="accent" x="40" y="120" width="180" height="180" rx="12"/>
  <text class="title" x="60" y="148">Log Sources</text>
  <text class="sub" x="60" y="172">POST /api/ingest/raw</text>
  <text class="sub" x="60" y="192">POST /api/ingest/events</text>
  <text class="sub" x="60" y="212">POST /api/ingest/file</text>
  <text class="sub" x="60" y="240">📁 ingest_watch/*.log</text>
  <text class="sub" x="60" y="258">(APScheduler poller)</text>
  <text class="sub" x="60" y="284">offset tail + rotation</text>

  <!-- Parser -->
  <rect class="card" x="250" y="140" width="150" height="110" rx="12"/>
  <text class="title" x="270" y="170">Parser</text>
  <text class="sub" x="270" y="194">plaintext + JSON</text>
  <text class="sub" x="270" y="214">level normalize</text>
  <text class="sub" x="270" y="234">bucket by service</text>

  <!-- DB -->
  <rect class="card" x="250" y="300" width="150" height="96" rx="12"/>
  <text class="title" x="270" y="330">Database</text>
  <text class="sub" x="270" y="354">SQLAlchemy 2.0</text>
  <text class="sub" x="270" y="374">SQLite / Postgres</text>

  <!-- AI Engine -->
  <rect class="ai" x="440" y="140" width="190" height="150" rx="12"/>
  <text class="title" x="462" y="168">Anomaly Engine</text>
  <text class="sub" x="462" y="192">Rolling-window Z-score</text>
  <text class="sub" x="462" y="212">EWMA adaptive baseline</text>
  <text class="sub" x="462" y="232">spike: z ≥ 3 &amp; count ≥ 5</text>
  <text class="sub" x="462" y="256">severity: warning/critical</text>
  <text class="sub" x="462" y="274">explainable (sole trigger)</text>

  <!-- LLM enrichment (opt-in) -->
  <rect class="ai" x="440" y="330" width="190" height="150" rx="12"/>
  <text class="title" x="462" y="358">🤖 LLM Enrichment</text>
  <text class="tagp" x="462" y="378">OPT-IN · OFF BY DEFAULT</text>
  <text class="sub" x="462" y="398">root-cause + remediation</text>
  <text class="sub" x="462" y="416">label + business-impact</text>
  <text class="sub" x="462" y="436">severity-gated (cost)</text>
  <text class="sub" x="462" y="454">signature cache · fail-safe</text>
  <text class="sub" x="462" y="472">OpenAI-compatible API</text>

  <!-- Alerting -->
  <rect class="alert" x="690" y="140" width="226" height="150" rx="12"/>
  <text class="title" x="712" y="168">Alerting</text>
  <text class="sub" x="712" y="192">Slack (Block Kit)</text>
  <text class="sub" x="712" y="212">Discord (rich embed)</text>
  <text class="sub" x="712" y="232">generic JSON / local sink</text>
  <text class="sub" x="712" y="256">auto-detect from URL</text>
  <text class="sub" x="712" y="274">+ AI insight when enriched</text>

  <!-- Dashboard -->
  <rect class="ok" x="690" y="330" width="226" height="150" rx="12"/>
  <text class="title" x="712" y="358">Dashboard (Chart.js)</text>
  <text class="sub" x="712" y="382">health score · error trend</text>
  <text class="sub" x="712" y="402">anomalies · AI Insight col</text>
  <text class="sub" x="712" y="422">fired alerts · poller controls</text>
  <text class="sub" x="712" y="442">one-click demo / enterprise</text>
  <text class="sub" x="712" y="462">auto-refresh · reads via API</text>

  <!-- Flows -->
  <path class="flow" d="M220 200 L438 195"/>            <!-- sources -> parser/engine region -->
  <path class="flow" d="M325 250 L325 298"/>            <!-- parser -> db -->
  <path class="flow" d="M400 340 C425 340 425 250 438 232"/> <!-- db -> engine -->
  <path class="flow" d="M630 200 L688 200"/>            <!-- engine -> alerting -->
  <path class="flowp" d="M535 290 L535 328"/>           <!-- engine -> LLM (opt-in) -->
  <path class="flowp" d="M630 390 C662 390 662 262 688 246"/> <!-- LLM -> alerting (enrichment) -->
  <path class="flowd" d="M803 290 L803 328"/>           <!-- alerting -> dashboard (log) -->
  <path class="flowd" d="M325 396 L325 500 L760 500 L760 482"/> <!-- db -> dashboard (trends) -->

  <text class="tag" x="640" y="132">threshold breached?</text>
  <text class="tagp" x="540" y="316">opt-in</text>

  <!-- Tech strip -->
  <text class="tag" x="32" y="548">Stack:</text>
  <text class="sub" x="80" y="548">FastAPI · Uvicorn · SQLAlchemy 2 · SQLite/Postgres · APScheduler · httpx · Chart.js · (opt-in) OpenAI-compatible LLM</text>
  <text class="tag" x="32" y="574">Deploy:</text>
  <text class="sub" x="88" y="574">Docker + docker-compose (Postgres) · GitHub Actions CI (SQLite + Postgres + image build + secret-gated LLM smoke)</text>
  <text class="tag" x="32" y="600">Tested:</text>
  <text class="sub" x="88" y="600">33 pytest cases — parser, detection scenarios, scheduler tailing/rotation, Slack/Discord, LLM gating + signature cache</text>
</svg>

