name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Tests (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest -q

  test-postgres:
    name: Tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulseguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulse -d pulseguard"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests against Postgres
        env:
          # conftest reads PULSE_TEST_DATABASE_URL so the full suite runs on PG.
          PULSE_TEST_DATABASE_URL: postgresql+psycopg2://pulse:pulse@localhost:5432/pulseguard
        run: pytest -q

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t pulse-guard-ai:ci .

  llm-smoke:
    name: LLM integration smoke (secret-gated)
    runs-on: ubuntu-latest
    # Secrets are unavailable to fork PRs; only run on push to this repo.
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run real-LLM smoke test (skips if no key)
        env:
          PULSE_LLM_ENABLED: "true"
          PULSE_LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PULSE_LLM_MODEL: gpt-4o-mini
          # OpenAI-compatible base URL override (optional):
          # PULSE_LLM_BASE_URL: https://api.openai.com/v1
        run: |
          if [ -z "$PULSE_LLM_API_KEY" ]; then
            echo "No OPENAI_API_KEY secret configured — skipping LLM smoke test."
            exit 0
          fi
          pytest -m integration -q tests/test_llm_integration.py

